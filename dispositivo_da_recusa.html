<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dispositivo da Recusa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #010306;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

// ── Void map ────────────────────────────────────────────────
// Grid tracks permanent absence. Organisms cannot re-enter.
const GS = 5; // grid cell size in pixels
let GW, GH, voidGrid;
let scarCanvas, scarCtx;  // offscreen: pre-rendered scar layer

function initVoid() {
  GW = Math.ceil(W / GS);
  GH = Math.ceil(H / GS);
  voidGrid = new Uint8Array(GW * GH);
  scarCanvas = document.createElement('canvas');
  scarCanvas.width  = W;
  scarCanvas.height = H;
  scarCtx = scarCanvas.getContext('2d');
  scarCtx.clearRect(0, 0, W, H);
}

// Mark void at (x,y) with given pixel radius. Only draws new cells.
function markVoid(x, y, r) {
  const cx = Math.floor(x / GS);
  const cy = Math.floor(y / GS);
  const gr = Math.ceil(r / GS);
  scarCtx.fillStyle = 'rgba(0,1,4,0.09)';
  for (let dy = -gr; dy <= gr; dy++) {
    for (let dx = -gr; dx <= gr; dx++) {
      if (dx * dx + dy * dy > gr * gr) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) continue;
      const idx = ny * GW + nx;
      if (!voidGrid[idx]) {
        voidGrid[idx] = 1;
        scarCtx.fillRect(nx * GS, ny * GS, GS, GS);
      }
    }
  }
}

// Returns 1 if (x,y) falls in a void cell
function inVoid(x, y) {
  const gx = x / GS | 0, gy = y / GS | 0;
  if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return 0;
  return voidGrid[gy * GW + gx];
}

// Gradient vector pushing away from nearby void cells (radius R cells)
function voidPush(x, y) {
  const cx = x / GS | 0, cy = y / GS | 0;
  const R = 4;
  let fx = 0, fy = 0;
  for (let dy = -R; dy <= R; dy++) {
    for (let dx = -R; dx <= R; dx++) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) continue;
      if (!voidGrid[ny * GW + nx]) continue;
      const d = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const s = (R - d) / R;
      if (s > 0) { fx -= dx / d * s; fy -= dy / d * s; }
    }
  }
  return { fx, fy };
}

// ── Organisms ────────────────────────────────────────────────
const N = 2400;
const orgs = {
  x:      new Float32Array(N),
  y:      new Float32Array(N),
  vx:     new Float32Array(N),
  vy:     new Float32Array(N),
  size:   new Float32Array(N),
  angle:  new Float32Array(N),
  aspd:   new Float32Array(N), // angle speed
  opac:   new Float32Array(N),
  warmth: new Float32Array(N),
  type:   new Uint8Array(N),   // 0=dot 1=rod 2=text
  flee:   new Uint8Array(N),   // countdown after repulsion
};

// Data remnants embedded in text organisms
const FRAGS = [
  'img_','nota','.jpg','.pdf','save','doc_','foto','2024',
  'msg_','back','tmp_','err_','lost','///','...','reset',
  '01/0','rascunho','sem t','perdi','apagou','—'
];

function initOrgs() {
  for (let i = 0; i < N; i++) {
    orgs.x[i]     = Math.random() * W;
    orgs.y[i]     = Math.random() * H;
    const spd     = 0.05 + Math.random() * 0.1;
    const ang     = Math.random() * Math.PI * 2;
    orgs.vx[i]    = Math.cos(ang) * spd;
    orgs.vy[i]    = Math.sin(ang) * spd;
    const r       = Math.random();
    orgs.type[i]  = r < 0.07 ? 2 : r < 0.27 ? 1 : 0;
    orgs.size[i]  = orgs.type[i] === 0 ? 0.9 + Math.random() * 2.1
                  : orgs.type[i] === 1 ? 0.8 + Math.random() * 1.4
                  :                      1.0 + Math.random() * 1.2;
    orgs.angle[i] = Math.random() * Math.PI;
    orgs.aspd[i]  = (Math.random() - 0.5) * 0.004;
    orgs.opac[i]  = 0.22 + Math.random() * 0.52;
    orgs.warmth[i]= Math.random() * 0.05;
    orgs.flee[i]  = 0;
  }
}

// Pre-compute text fragment assignments (index into FRAGS)
const orgFrag = new Uint8Array(N);
for (let i = 0; i < N; i++) orgFrag[i] = Math.floor(Math.random() * FRAGS.length);

// ── Active touches ───────────────────────────────────────────
const pointers = {}; // id → { x, y, speed }

function ptDown(id, x, y) {
  pointers[id] = { x, y, speed: 0, px: x, py: y };
  markVoid(x, y, 18);
}
function ptMove(id, x, y) {
  const p = pointers[id]; if (!p) return;
  const dx = x - p.x, dy = y - p.y;
  p.speed  = Math.min(Math.sqrt(dx * dx + dy * dy) / 14, 1);
  p.px = p.x; p.py = p.y;
  p.x = x; p.y = y;
  markVoid(x, y, 13 + p.speed * 32);
}
function ptUp(id)  { delete pointers[id]; }

canvas.addEventListener('touchstart',  e => { e.preventDefault(); for (const t of e.changedTouches) ptDown(t.identifier, t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchmove',   e => { e.preventDefault(); for (const t of e.changedTouches) ptMove(t.identifier, t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); for (const t of e.changedTouches) ptUp(t.identifier); }, { passive: false });
canvas.addEventListener('touchcancel', e => { for (const t of e.changedTouches) ptUp(t.identifier); });

let mdwn = false;
canvas.addEventListener('mousedown',  e => { mdwn = true;  ptDown('m', e.clientX, e.clientY); });
canvas.addEventListener('mousemove',  e => { if (mdwn) ptMove('m', e.clientX, e.clientY); });
canvas.addEventListener('mouseup',    () => { mdwn = false; ptUp('m'); });
canvas.addEventListener('mouseleave', () => { mdwn = false; ptUp('m'); });

// ── Update organisms ──────────────────────────────────────────
const ptArr = []; // reused each frame

function update() {
  ptArr.length = 0;
  for (const k in pointers) ptArr.push(pointers[k]);

  for (let i = 0; i < N; i++) {
    let x = orgs.x[i], y = orgs.y[i];
    let vx = orgs.vx[i], vy = orgs.vy[i];
    let fl = orgs.flee[i];
    if (fl > 0) fl--;

    // Brownian nudge
    vx += (Math.random() - 0.5) * 0.018;
    vy += (Math.random() - 0.5) * 0.018;

    // Void repulsion
    const { fx, fy } = voidPush(x, y);
    if (fx || fy) {
      vx += fx * 0.18;
      vy += fy * 0.18;
      orgs.warmth[i] = Math.min(1, orgs.warmth[i] + 0.008);
    }

    // Touch repulsion — calm, proportional to velocity
    for (let j = 0; j < ptArr.length; j++) {
      const p  = ptArr[j];
      const dx = x - p.x, dy = y - p.y;
      const d2 = dx * dx + dy * dy;
      const rr = 55 + p.speed * 110;
      if (d2 < rr * rr && d2 > 0.01) {
        const d  = Math.sqrt(d2);
        const s  = (1 - d / rr) * (1 - d / rr) * (0.7 + p.speed * 1.8);
        vx += (dx / d) * s;
        vy += (dy / d) * s;
        fl  = Math.max(fl, 50);
      }
    }

    // Dampen
    const damp = fl > 0 ? 0.92 : 0.975;
    vx *= damp; vy *= damp;

    // Speed cap
    const spd = Math.sqrt(vx * vx + vy * vy);
    const cap = fl > 0 ? 5.0 : 0.55;
    if (spd > cap) { vx = vx / spd * cap; vy = vy / spd * cap; }

    // Advance
    x += vx; y += vy;
    orgs.angle[i] += orgs.aspd[i];

    // Void collision — bounce back, gain warmth
    if (inVoid(x, y)) {
      x -= vx * 2; y -= vy * 2;
      vx *= -0.4; vy *= -0.4;
      orgs.warmth[i] = Math.min(1, orgs.warmth[i] + 0.06);
    }

    // Soft wall
    const m = 6;
    if (x < m)     vx += 0.12;
    if (x > W - m) vx -= 0.12;
    if (y < m)     vy += 0.12;
    if (y > H - m) vy -= 0.12;

    x = Math.max(1, Math.min(W - 1, x));
    y = Math.max(1, Math.min(H - 1, y));

    // Edge warmth: organisms compressed to margins glow amber
    const edge = Math.min(x, W - x, y, H - y);
    if (edge < 28) orgs.warmth[i] = Math.min(1, orgs.warmth[i] + 0.0015);
    else if (!fx && !fy) orgs.warmth[i] = Math.max(0, orgs.warmth[i] - 0.0008);

    orgs.x[i] = x; orgs.y[i] = y;
    orgs.vx[i] = vx; orgs.vy[i] = vy;
    orgs.flee[i] = fl;
  }
}

// ── Render organisms ──────────────────────────────────────────
function render() {
  // Deep background fade — slow trail accumulation
  ctx.fillStyle = 'rgba(1,3,6,0.30)';
  ctx.fillRect(0, 0, W, H);

  // Permanent void scar layer
  ctx.drawImage(scarCanvas, 0, 0);

  // Organisms drawn with additive blending → bioluminescence
  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < N; i++) {
    const w = orgs.warmth[i];
    const x = orgs.x[i], y = orgs.y[i];
    const sz = orgs.size[i];
    const op = orgs.opac[i] * (orgs.flee[i] > 0 ? 1.1 : 0.88);

    // Color: cold bioluminescent white-blue → warm amber at margins
    const R = (165 + w * 70) | 0;
    const G = (185 + w * 15) | 0;
    const B = (205 - w * 80) | 0;

    ctx.globalAlpha = Math.min(op, 1.0);

    if (orgs.type[i] === 0) {
      // Dot — two circles: glow halo + core
      ctx.beginPath();
      ctx.arc(x, y, sz * 2.2, 0, 6.2832);
      ctx.fillStyle = `rgba(${R},${G},${B},0.08)`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, 6.2832);
      ctx.fillStyle = `rgb(${R},${G},${B})`;
      ctx.fill();

    } else if (orgs.type[i] === 1) {
      // Rod
      const a  = orgs.angle[i];
      const len = sz * 3.2;
      ctx.strokeStyle = `rgb(${R},${G},${B})`;
      ctx.lineWidth   = sz * 0.55;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(x - Math.cos(a) * len, y - Math.sin(a) * len);
      ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
      ctx.stroke();

    } else {
      // Text fragment — data memory
      ctx.globalAlpha = Math.min(op * 0.28, 0.28);
      ctx.fillStyle   = `rgb(${R},${G},${B})`;
      ctx.font        = `${(sz * 3.5 + 4) | 0}px monospace`;
      ctx.fillText(FRAGS[orgFrag[i]], x, y);
    }
  }

  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

// ── Main loop ────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ── Init ─────────────────────────────────────────────────────
function init() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.fillStyle = '#010306';
  ctx.fillRect(0, 0, W, H);
  initVoid();
  initOrgs();
  loop();
}

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initVoid(); // resets void on resize — acceptable
});

init();
</script>
</body>
</html>
